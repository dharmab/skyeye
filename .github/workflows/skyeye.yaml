name: SkyEye
on:
  push:
    branches: [main, v2-dev]
  pull_request:
    branches: [main, v2-dev]
  release:
    types: [published]
permissions: {}
jobs:
  lint:
    name: Lint (${{ matrix.backend }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        backend: [cpu, vulkan]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup
        uses: ./.github/actions/setup
      - name: Install Vulkan dependencies
        if: matrix.backend == 'vulkan'
        run: sudo apt-get update && sudo apt-get install -y libvulkan-dev glslc
      - name: Build whisper.cpp
        uses: ./.github/actions/build-whisper
        with:
          backend: ${{ matrix.backend }}
      - name: Lint
        run: WHISPER_CPP_BACKEND=${{ matrix.backend }} make ci-lint
  test:
    name: Test (${{ matrix.backend }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        backend: [cpu, vulkan]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup
        uses: ./.github/actions/setup
      - name: Install Vulkan dependencies
        if: matrix.backend == 'vulkan'
        run: sudo apt-get update && sudo apt-get install -y libvulkan-dev glslc
      - name: Build whisper.cpp
        uses: ./.github/actions/build-whisper
        with:
          backend: ${{ matrix.backend }}
      - name: Test
        run: WHISPER_CPP_BACKEND=${{ matrix.backend }} make test
  build-linux-amd64:
    name: Build on Linux AMD64
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup
        uses: ./.github/actions/setup
      - name: Build whisper.cpp
        uses: ./.github/actions/build-whisper
      - name: Create dist
        run: make dist-linux
      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: skyeye-linux-amd64.tar.gz
          path: dist/skyeye-linux-amd64.tar.gz
          if-no-files-found: error
          overwrite: true
  build-linux-amd64-vulkan:
    name: Build on Linux AMD64 (Vulkan)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup
        uses: ./.github/actions/setup
      - name: Install Vulkan dependencies
        run: sudo apt-get update && sudo apt-get install -y libvulkan-dev glslc
      - name: Build whisper.cpp
        uses: ./.github/actions/build-whisper
        with:
          backend: vulkan
      - name: Create dist
        run: make dist-linux-vulkan
      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: skyeye-linux-amd64-vulkan.tar.gz
          path: dist/skyeye-linux-amd64-vulkan.tar.gz
          if-no-files-found: error
          overwrite: true
  build-macos-arm64:
    name: Build on macOS
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install dependencies
        run: make install-macos-dependencies
      - name: Build whisper.cpp
        uses: ./.github/actions/build-whisper
        with:
          os: macos
          arch: arm64
      - name: Create dist
        run: make dist-macos
      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: skyeye-macos-arm64.tar.gz
          path: dist/skyeye-macos-arm64.tar.gz
          if-no-files-found: error
          overwrite: true
  build-windows-amd64:
    name: Build on Windows AMD64
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      GOROOT: /ucrt64/lib/go
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: |
            base-devel
            git
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-opus
            mingw-w64-ucrt-x86_64-libsoxr
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-go
            mingw-w64-ucrt-x86_64-curl
            zip
      - name: Build whisper.cpp
        uses: ./.github/actions/build-whisper
        with:
          os: windows
          shell: msys2 {0}
      - name: Create dist
        shell: msys2 {0}
        run: make dist-windows
      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: skyeye-windows-amd64.zip
          path: dist/skyeye-windows-amd64.zip
          if-no-files-found: error
          overwrite: true
  build-windows-amd64-vulkan:
    name: Build on Windows AMD64 (Vulkan)
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      GOROOT: /ucrt64/lib/go
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: |
            base-devel
            git
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-opus
            mingw-w64-ucrt-x86_64-libsoxr
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-go
            mingw-w64-ucrt-x86_64-curl
            mingw-w64-ucrt-x86_64-vulkan-headers
            mingw-w64-ucrt-x86_64-vulkan-loader
            mingw-w64-ucrt-x86_64-shaderc
            mingw-w64-ucrt-x86_64-spirv-tools
            zip
      - name: Build whisper.cpp
        uses: ./.github/actions/build-whisper
        with:
          os: windows
          shell: msys2 {0}
          backend: vulkan
      - name: Create dist
        shell: msys2 {0}
        run: make dist-windows-vulkan
      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: skyeye-windows-amd64-vulkan.zip
          path: dist/skyeye-windows-amd64-vulkan.zip
          if-no-files-found: error
          overwrite: true
  build-image:
    name: Build container image
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          build-args: |
            SKYEYE_VERSION: ${{ env.GITHUB_REF_NAME }}
  release:
    name: Upload release assets
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
    needs:
      - lint
      - test
      - build-linux-amd64
      - build-linux-amd64-vulkan
      - build-windows-amd64
      - build-windows-amd64-vulkan
      - build-macos-arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: skyeye-*
          path: dist
          merge-multiple: true
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/skyeye-linux-amd64.tar.gz
            dist/skyeye-linux-amd64-vulkan.tar.gz
            dist/skyeye-macos-arm64.tar.gz
            dist/skyeye-windows-amd64.zip
            dist/skyeye-windows-amd64-vulkan.zip
          token: ${{ secrets.RELEASE_TOKEN }}
  push-images:
    name: Build and push container images
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - lint
      - test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Build and push image
        uses: ./.github/actions/build-container
        with:
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ github.repository }}
          target: skyeye
          skyeye-version: ${{ env.GITHUB_REF_NAME }}
      - name: Build and push scaler image
        uses: ./.github/actions/build-container
        with:
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ github.repository }}-scaler
          target: skyeye-scaler
          skyeye-version: ${{ env.GITHUB_REF_NAME }}
      - name: Build and push Vulkan image
        uses: ./.github/actions/build-container
        with:
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ github.repository }}
          target: skyeye
          tag-suffix: '-vulkan'
          skyeye-version: ${{ env.GITHUB_REF_NAME }}
          backend: vulkan
